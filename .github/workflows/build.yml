name: Build EmEditor AI Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Build x64 Release
      run: msbuild EmEditorAIPlugin.sln /p:Configuration=Release /p:Platform=x64
      
    - name: Upload x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: EmEditorAIPlugin-x64
        path: x64/Release/EmEditorAIPlugin.dll
